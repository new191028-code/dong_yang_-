<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小小知識王｜新題庫全頁注音深色抽卡機器</title>
  <style>

    @font-face {
      font-family: "Bpmf GenYo Gothic R";
      src:
        local("Bpmf GenYo Gothic R"),
        local("BpmfGenYoGothic-R"),
        local("ㄅ源樣注音黑體 R"),
        url("./BpmfGenYoGothic-R (2)(1).ttf") format("truetype"),
        url("./BpmfGenYoGothic-R (2).ttf") format("truetype"),
        url("./BpmfGenYoGothic-R.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    :root {
      --bg: #f5efe6;
      --bg-2: #e7dccd;
      --ink: #3f3a33;
      --muted: #776c61;
      --panel: rgba(255, 252, 246, 0.88);
      --panel-solid: #fffaf2;
      --line: rgba(63, 58, 51, 0.14);
      --shadow: 0 24px 70px rgba(80, 62, 44, 0.18);
      --soft-shadow: 0 12px 30px rgba(80, 62, 44, 0.13);
      --card-front: #fff9ef;
      --card-back: #c9b9a2;
      --accent: #9f8f79;
      --accent-2: #7f9681;
      --accent-3: #b98e7c;
      --danger: #b86458;
      --ok: #759475;
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --timer-progress: 100%;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", system-ui, sans-serif;
      background:
        radial-gradient(circle at 18% 12%, rgba(255,255,255,0.76), transparent 34%),
        radial-gradient(circle at 82% 18%, rgba(194, 180, 158, 0.28), transparent 32%),
        linear-gradient(135deg, var(--bg), var(--bg-2));
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.46;
      background-image:
        linear-gradient(rgba(63,58,51,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(63,58,51,0.035) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black 0 58%, transparent 86%);
    }

    button {
      font: inherit;
      border: 0;
      cursor: pointer;
      color: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .app {
      position: relative;
      width: min(1180px, calc(100vw - 32px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 34px 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .screen {
      width: 100%;
      display: none;
      animation: fadeIn 360ms ease both;
    }

    .screen.active {
      display: block;
    }

    .hero, .menu-panel, .draw-panel {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.62);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      border-radius: var(--radius-xl);
    }

    .hero {
      min-height: min(720px, calc(100vh - 72px));
      padding: clamp(28px, 4vw, 58px);
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: clamp(28px, 5vw, 64px);
      align-items: center;
      overflow: hidden;
    }

    .brand-kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.46);
      color: var(--muted);
      font-size: 0.96rem;
      letter-spacing: 0.08em;
    }

    .brand-kicker::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--accent-2);
      box-shadow: 0 0 0 6px rgba(127, 150, 129, 0.14);
    }

    h1, h2, h3, p { margin: 0; }

    .hero h1 {
      margin-top: 22px;
      font-size: clamp(3rem, 8vw, 6.9rem);
      line-height: 0.95;
      letter-spacing: -0.08em;
      font-weight: 900;
    }

    .hero h1 span {
      display: block;
      color: var(--accent);
    }

    .hero-subtitle {
      margin-top: 28px;
      max-width: 560px;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.25rem);
      line-height: 1.8;
    }

    .hero-actions {
      margin-top: 34px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .primary-btn, .ghost-btn, .difficulty-btn, .grade-btn, .danger-btn {
      border-radius: 999px;
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    .primary-btn {
      padding: 15px 24px;
      color: #fffaf3;
      background: linear-gradient(135deg, #6f846e, #9d8d78);
      box-shadow: 0 14px 30px rgba(111, 132, 110, 0.25);
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .ghost-btn {
      padding: 13px 20px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.46);
      color: var(--muted);
      font-weight: 700;
    }

    .primary-btn:hover, .ghost-btn:hover, .difficulty-btn:hover, .grade-btn:hover, .danger-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--soft-shadow);
    }

    .card-sculpture {
      position: relative;
      height: 510px;
      min-height: 400px;
    }

    .floating-card {
      position: absolute;
      width: 178px;
      height: 246px;
      border-radius: 24px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.32), transparent 34%),
        repeating-linear-gradient(45deg, rgba(255,255,255,0.14) 0 7px, transparent 7px 16px),
        var(--card-back);
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: 0 24px 48px rgba(66, 54, 42, 0.18);
      display: grid;
      place-items: center;
      animation: floatCard 5.6s ease-in-out infinite;
    }

    .floating-card::before {
      content: "？";
      width: 74px;
      height: 74px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: rgba(255, 250, 242, 0.82);
      color: var(--accent);
      font-size: 3rem;
      font-weight: 900;
      box-shadow: inset 0 0 0 1px rgba(63,58,51,0.08);
    }

    .floating-card.one { left: 8%; top: 15%; transform: rotate(-14deg); }
    .floating-card.two { right: 17%; top: 8%; transform: rotate(10deg); animation-delay: -1.8s; background-color: #b8c0a9; }
    .floating-card.three { left: 34%; bottom: 3%; transform: rotate(4deg); animation-delay: -3.1s; background-color: #caa693; }
    .floating-orb {
      position: absolute;
      border-radius: 999px;
      filter: blur(0.2px);
      opacity: 0.78;
    }

    .orb-a { width: 84px; height: 84px; right: 7%; bottom: 24%; background: rgba(127, 150, 129, 0.23); }
    .orb-b { width: 48px; height: 48px; left: 18%; bottom: 28%; background: rgba(185, 142, 124, 0.25); }

    .menu-panel {
      min-height: min(720px, calc(100vh - 72px));
      padding: clamp(24px, 4vw, 48px);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      margin-bottom: 30px;
    }

    .topbar-title {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .eyebrow {
      color: var(--muted);
      font-size: 0.94rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .menu-panel h2, .draw-panel h2 {
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 1.14;
      letter-spacing: -0.04em;
    }

    .choice-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px;
      margin-top: 34px;
    }

    .grade-btn, .difficulty-btn {
      min-height: 240px;
      padding: 28px;
      text-align: left;
      background: rgba(255,250,242,0.76);
      border: 1px solid rgba(63,58,51,0.10);
      box-shadow: 0 14px 40px rgba(66, 54, 42, 0.10);
      overflow: hidden;
      position: relative;
    }

    .grade-btn::after, .difficulty-btn::after {
      content: "";
      position: absolute;
      width: 210px;
      height: 210px;
      border-radius: 999px;
      right: -78px;
      bottom: -84px;
      background: rgba(159, 143, 121, 0.13);
    }

    .grade-icon, .difficulty-icon {
      width: 62px;
      height: 62px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      margin-bottom: 24px;
      background: rgba(127, 150, 129, 0.15);
      font-size: 2rem;
    }

    .grade-btn h3, .difficulty-btn h3 {
      font-size: clamp(1.6rem, 3vw, 2.45rem);
      letter-spacing: -0.04em;
      margin-bottom: 10px;
    }

    .grade-btn p, .difficulty-btn p {
      color: var(--muted);
      line-height: 1.7;
      font-size: 1.05rem;
      max-width: 360px;
    }

    .difficulty-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .difficulty-btn {
      min-height: 220px;
    }

    .difficulty-btn.easy .difficulty-icon { background: rgba(117, 148, 117, 0.16); }
    .difficulty-btn.medium .difficulty-icon { background: rgba(159, 143, 121, 0.17); }
    .difficulty-btn.hard .difficulty-icon { background: rgba(184, 100, 88, 0.14); }

    .draw-panel {
      min-height: min(780px, calc(100vh - 42px));
      padding: clamp(18px, 3vw, 38px);
      position: relative;
      overflow: hidden;
    }

    .draw-header {
      position: relative;
      z-index: 4;
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      width: fit-content;
      padding: 10px 16px;
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255,255,255,0.52);
      border: 1px solid var(--line);
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--accent-2);
      box-shadow: 0 0 0 7px rgba(127,150,129,0.14);
    }

    .draw-stage {
      position: relative;
      min-height: 560px;
      display: grid;
      place-items: center;
    }

    .shuffle-zone {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 300ms ease, transform 300ms ease;
    }

    .shuffle-zone.show {
      opacity: 1;
      transform: translateY(0);
    }

    .deck {
      position: relative;
      width: 168px;
      height: 228px;
    }

    .deck-card {
      position: absolute;
      inset: 0;
      border-radius: 22px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.34), transparent 32%),
        repeating-linear-gradient(45deg, rgba(255,255,255,0.13) 0 7px, transparent 7px 16px),
        var(--card-back);
      border: 1px solid rgba(255,255,255,0.56);
      box-shadow: 0 22px 44px rgba(66,54,42,0.18);
      display: grid;
      place-items: center;
      font-size: 3rem;
      color: rgba(255,250,242,0.92);
      font-weight: 900;
    }

    .deck-card:nth-child(1) { transform: translate(-18px, 6px) rotate(-10deg); animation: shuffleOne 780ms ease-in-out infinite; }
    .deck-card:nth-child(2) { transform: translate(14px, -8px) rotate(9deg); animation: shuffleTwo 780ms ease-in-out infinite; }
    .deck-card:nth-child(3) { transform: translate(0, 0) rotate(0deg); animation: shuffleThree 780ms ease-in-out infinite; }

    .shuffle-text {
      margin-top: 260px;
      color: var(--muted);
      font-weight: 900;
      letter-spacing: 0.18em;
      animation: pulseText 900ms ease-in-out infinite alternate;
    }

    .cards-spread {
      position: absolute;
      inset: 0;
      display: flex;
      flex-wrap: wrap;
      align-content: center;
      justify-content: center;
      gap: 18px;
      padding: 74px 20px 42px;
      opacity: 0;
      transform: scale(0.96);
      pointer-events: none;
      transition: opacity 420ms ease, transform 420ms ease;
    }

    .cards-spread.show {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    .pick-card {
      width: clamp(92px, 9.2vw, 122px);
      height: clamp(132px, 13vw, 172px);
      perspective: 1100px;
      border-radius: 18px;
      background: transparent;
      transform: translateY(24px) scale(0.92) rotate(var(--spread-rotate, 0deg));
      opacity: 0;
      animation: dealCard 520ms cubic-bezier(.2,.8,.2,1) forwards;
      animation-delay: var(--deal-delay, 0ms);
    }

    .pick-card:hover {
      z-index: 6;
      transform: translateY(-8px) scale(1.04) rotate(var(--spread-rotate, 0deg));
    }

    .pick-card.collect {
      pointer-events: none;
      animation: collectCard 520ms cubic-bezier(.6,-0.06,.72,.38) forwards;
    }

    .pick-card.chosen {
      pointer-events: none;
      z-index: 20;
      animation: chosenCard 640ms cubic-bezier(.2,.8,.2,1) forwards;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 720ms cubic-bezier(.25,.9,.25,1);
    }

    .pick-card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 18px;
      backface-visibility: hidden;
      border: 1px solid rgba(255,255,255,0.58);
      box-shadow: 0 14px 30px rgba(66,54,42,0.13);
      overflow: hidden;
    }

    .card-back {
      background:
        linear-gradient(145deg, rgba(255,255,255,0.31), transparent 34%),
        repeating-linear-gradient(45deg, rgba(255,255,255,0.13) 0 7px, transparent 7px 16px),
        var(--card-back);
      display: grid;
      place-items: center;
    }

    .card-back span {
      width: 45%;
      aspect-ratio: 1;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(255,250,242,0.82);
      color: var(--accent);
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 900;
    }

    .card-front {
      transform: rotateY(180deg);
      background: var(--card-front);
      display: grid;
      place-items: center;
      padding: 14px;
      text-align: center;
      font-weight: 900;
      color: var(--accent);
    }

    .question-view {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: minmax(270px, 0.82fr) minmax(320px, 1.18fr);
      gap: clamp(18px, 3vw, 34px);
      align-items: stretch;
      padding: 78px clamp(16px, 2.8vw, 34px) 34px;
      opacity: 0;
      transform: translateY(18px);
      pointer-events: none;
      transition: opacity 380ms ease, transform 380ms ease;
      z-index: 8;
    }

    .question-view.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .timer-card, .question-card {
      border-radius: var(--radius-lg);
      background: rgba(255,250,242,0.83);
      border: 1px solid rgba(63,58,51,0.10);
      box-shadow: 0 16px 42px rgba(66,54,42,0.12);
    }

    .timer-card {
      padding: 26px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 430px;
    }

    .timer-ring {
      width: min(260px, 62vw);
      aspect-ratio: 1;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background:
        conic-gradient(var(--accent-2) var(--timer-progress), rgba(255,244,222,0.11) 0);
      box-shadow: inset 0 0 0 1px rgba(63,58,51,0.06);
      position: relative;
    }

    .timer-ring::before {
      content: "";
      position: absolute;
      inset: 16px;
      border-radius: 999px;
      background: var(--panel-solid);
      box-shadow: inset 0 0 0 1px rgba(63,58,51,0.08);
    }

    .timer-number {
      position: relative;
      z-index: 2;
      font-size: clamp(4rem, 10vw, 6.5rem);
      line-height: 1;
      font-weight: 950;
      letter-spacing: -0.06em;
    }

    .timer-label {
      position: relative;
      z-index: 2;
      margin-top: 8px;
      color: var(--muted);
      font-weight: 800;
      letter-spacing: 0.16em;
    }

    .timer-actions {
      margin-top: 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    .danger-btn {
      padding: 13px 19px;
      background: rgba(184, 100, 88, 0.13);
      color: #9b5148;
      border: 1px solid rgba(184, 100, 88, 0.20);
      font-weight: 900;
    }

    .question-card {
      padding: clamp(22px, 3vw, 38px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 430px;
    }

    .question-number {
      color: var(--muted);
      font-weight: 900;
      letter-spacing: 0.12em;
      margin-bottom: 20px;
    }

    .question-text {
      font-size: clamp(2rem, 4.6vw, 4.7rem);
      line-height: 1.24;
      letter-spacing: -0.04em;
      font-weight: 950;
    }

    .answer-box {
      margin-top: 28px;
      padding: 20px 22px;
      border-radius: 20px;
      background: rgba(117, 148, 117, 0.12);
      border: 1px solid rgba(117, 148, 117, 0.22);
      display: none;
      animation: answerPop 420ms cubic-bezier(.17,.84,.44,1) both;
    }

    .answer-box.show {
      display: block;
    }

    .answer-label {
      color: var(--ok);
      font-weight: 950;
      letter-spacing: 0.14em;
      margin-bottom: 10px;
    }

    .answer-text {
      font-size: clamp(1.7rem, 4vw, 3.4rem);
      line-height: 1.28;
      font-weight: 950;
      color: #526f52;
    }

    .after-actions {
      display: none;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    .after-actions.show {
      display: flex;
    }

    .mini-note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.6;
    }

    .hidden {
      display: none !important;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes floatCard {
      0%, 100% { translate: 0 0; }
      50% { translate: 0 -18px; }
    }

    @keyframes shuffleOne {
      0%, 100% { transform: translate(-18px, 6px) rotate(-10deg); }
      50% { transform: translate(42px, -8px) rotate(13deg); }
    }

    @keyframes shuffleTwo {
      0%, 100% { transform: translate(14px, -8px) rotate(9deg); }
      50% { transform: translate(-40px, 10px) rotate(-14deg); }
    }

    @keyframes shuffleThree {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(0, -18px) rotate(3deg); }
    }

    @keyframes pulseText {
      from { opacity: 0.55; }
      to { opacity: 1; }
    }

    @keyframes dealCard {
      to { opacity: 1; transform: translateY(0) scale(1) rotate(var(--spread-rotate, 0deg)); }
    }

    @keyframes collectCard {
      to {
        opacity: 0;
        transform: translate(var(--collect-x, 0px), var(--collect-y, -200px)) scale(0.2) rotate(18deg);
      }
    }

    @keyframes chosenCard {
      0% { opacity: 1; }
      100% { opacity: 1; transform: translateY(-14px) scale(1.14) rotate(0deg); }
    }

    @keyframes answerPop {
      from { opacity: 0; transform: translateY(14px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .card-sculpture {
        height: 360px;
        min-height: 300px;
      }

      .floating-card {
        width: 138px;
        height: 194px;
      }

      .choice-grid, .difficulty-grid {
        grid-template-columns: 1fr;
      }

      .grade-btn, .difficulty-btn {
        min-height: 180px;
      }

      .question-view {
        grid-template-columns: 1fr;
        padding-top: 88px;
      }

      .timer-card, .question-card {
        min-height: auto;
      }

      .timer-ring {
        width: 190px;
      }

      .draw-stage {
        min-height: 760px;
      }
    }

    @media (max-width: 560px) {
      .app {
        width: min(100vw - 18px, 1180px);
        padding: 9px 0;
      }

      .hero, .menu-panel, .draw-panel {
        border-radius: 24px;
      }

      .topbar, .draw-header {
        align-items: stretch;
        flex-direction: column;
      }

      .cards-spread {
        gap: 12px;
        padding-left: 8px;
        padding-right: 8px;
      }

      .pick-card {
        width: 78px;
        height: 112px;
        border-radius: 14px;
      }

      .card-face {
        border-radius: 14px;
      }

      .question-text {
        font-size: 2rem;
      }
    }



    /* 深色主題與防裁切調整 */
    :root {
      --bg: #080b12;
      --bg-2: #151a24;
      --ink: #f7efe1;
      --muted: #b8ad9d;
      --panel: rgba(16, 20, 31, 0.88);
      --panel-solid: #111722;

    .deck-card,
    .card-back {

    .floating-card::before,

    .timer-ring::before {
      background: rgba(17, 23, 34, 0.92);
      color: var(--accent);
      box-shadow: inset 0 0 0 1px rgba(255, 244, 222, 0.12);

      background: linear-gradient(145deg, #151c2a, #0f1420);

      border-color: rgba(255, 244, 222, 0.18);

    .question-view {
      align-items: stretch;
      padding-top: 92px;
      padding-bottom: 38px;
    }

    .question-card {
      justify-content: flex-start;
      gap: 0;
      overflow: visible;
      min-width: 0;
    }

    .question-number {
      flex: 0 0 auto;
      color: #d5c8b4;
    }

    .question-text {

      letter-spacing: -0.02em;
      overflow-wrap: anywhere;
      word-break: normal;
      max-width: 100%;
    }

    .answer-box {
      background: rgba(143, 224, 164, 0.10);
      border-color: rgba(143, 224, 164, 0.25);
      flex: 0 0 auto;

    .answer-label {
      color: var(--ok);

    .difficulty-btn p,
    .shuffle-text,

    .after-actions {

    }

      }

      .question-card {
        min-height: auto;
      }

      }

      }

      .answer-text {
        font-size: clamp(1.25rem, 5.8vw, 1.85rem);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  

    /* 注音版與無 icon 調整 */
    .grade-icon,
    .difficulty-icon,

      display: none !important;

    .grade-btn,

    body.low-grade-mode,

    body.low-grade-mode .hero,
    body.low-grade-mode .menu-panel,

    .low-grade-mode .answer-text,
    .low-grade-mode .grade-btn,
    .low-grade-mode .difficulty-btn,
    .low-grade-mode .status-pill,
    .low-grade-mode .timer-hint,
    .low-grade-mode .timer-number,

</head>
<body>
  <main class="app" aria-live="polite">
    <section id="startScreen" class="screen active">
      <div class="hero">

          </p>
          <div class="hero-actions">
            <button class="primary-btn" onclick="goGrade()">開始抽卡</button>
            <button class="ghost-btn" onclick="toggleFullScreen()">全螢幕模式</button>
          </div>
        </div>
        <div class="card-sculpture" aria-hidden="true">
          <div class="floating-card one"></div>
          <div class="floating-card two"></div>
          <div class="floating-card three"></div>
          <div class="floating-orb orb-a"></div>
          <div class="floating-orb orb-b"></div>
        </div>
      </div>
    </section>

    <section id="gradeScreen" class="screen">
      <div class="menu-panel">
        <div class="topbar">
          <div class="topbar-title">
            <div class="eyebrow">Step 1</div>
            <h2>選擇學生年級</h2>
          </div>
          <button class="ghost-btn" onclick="showScreen('startScreen')">回首頁</button>
        </div>

        <div class="choice-grid">
          <button class="grade-btn" onclick="selectGrade('low')">
            <h3>低年級</h3>
            <p>適合國小低年級學生，題目較生活化，包含簡單地理、自然、語文與數學。</p>
          </button>
          <button class="grade-btn" onclick="selectGrade('upper')">
            <h3>中高年級</h3>
            <p>適合國小中、高年級學生，加入更多臺灣地理、歷史、自然與推理題。</p>
          </button>
        </div>
      </div>
    </section>

    <section id="difficultyScreen" class="screen">
      <div class="menu-panel">
        <div class="topbar">
          <div class="topbar-title">
            <div class="eyebrow" id="gradeLabel">Step 2</div>
            <h2>選擇抽題難度</h2>
          </div>
          <button class="ghost-btn" onclick="showScreen('gradeScreen')">重新選年級</button>
        </div>

        <div class="choice-grid difficulty-grid">
          <button class="difficulty-btn easy" onclick="startDraw('easy')">
            <h3>簡單</h3>
            <p id="easyCount">基礎暖身題，適合快速進入狀況。</p>
          </button>
          <button class="difficulty-btn medium" onclick="startDraw('medium')">
            <h3>中等</h3>
            <p id="mediumCount">需要多想一步，適合分組討論。</p>
          </button>
          <button class="difficulty-btn hard" onclick="startDraw('hard')">
            <h3>困難</h3>
            <p id="hardCount">挑戰題，適合搶答或加分。</p>
          </button>
        </div>
      </div>
    </section>

    <section id="drawScreen" class="screen">
      <div class="draw-panel">
        <div class="draw-header">
          <div>
            <div class="status-pill"><span id="drawStatus">準備洗牌</span></div>
            <h2 id="drawTitle" style="margin-top: 14px;">抽一張題卡</h2>
          </div>
          <button class="ghost-btn" onclick="returnToDifficulty()">返回難度選擇</button>
        </div>

        <div class="draw-stage">
          <div id="shuffleZone" class="shuffle-zone">
            <div class="deck">
              <div class="deck-card">？</div>
              <div class="deck-card">？</div>
              <div class="deck-card">？</div>
            </div>
            <div class="shuffle-text">洗牌中</div>
          </div>

          <div id="cardsSpread" class="cards-spread"></div>

          <div id="questionView" class="question-view">
            <div class="timer-card">
              <div class="timer-ring" id="timerRing">
                <div>
                  <div class="timer-number" id="timerNumber">40</div>
                  <div class="timer-label">秒</div>
                </div>
              </div>
              <div class="timer-actions">
                <button id="finishEarlyBtn" class="danger-btn" onclick="revealAnswer(true)">提前結束</button>
              </div>
              <p class="mini-note" id="timerHint">學生作答中，時間到會自動公布答案。</p>
            </div>

            <div class="question-card">
              <div class="question-number" id="questionNumber">第 1 題</div>
              <div class="question-text" id="questionText"></div>

              <div id="answerBox" class="answer-box">
                <div class="answer-label">正確解答</div>
                <div class="answer-text" id="answerText"></div>
              </div>

              <div id="afterActions" class="after-actions">
                <button class="primary-btn" onclick="returnToDifficulty()">回到難度選擇</button>
                <button id="sameDifficultyBtn" class="ghost-btn" onclick="startDraw(currentDifficulty)">同難度再抽一題</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

    const difficultyText = {
      easy: "簡單",
      medium: "中等",
      hard: "困難"
    };

    const remainingQuestions = {};

    function initializeRemainingQuestions() {
      Object.keys(questionBank).forEach(grade => {
        remainingQuestions[grade] = {};
        Object.keys(difficultyText).forEach(difficulty => {
          remainingQuestions[grade][difficulty] = questionBank[grade][difficulty].map((item, index) => ({
            ...item,
            _cardId: `${grade}-${difficulty}-${index}`
          }));
        });
      });
    }

    function getRemainingQuestions(grade, difficulty) {
      return remainingQuestions[grade]?.[difficulty] || [];
    }

    function removeDrawnQuestion(grade, difficulty, question) {
      if (!question) return;
      remainingQuestions[grade][difficulty] = getRemainingQuestions(grade, difficulty)
        .filter(item => item._cardId !== question._cardId);
    }

    function updateSameDifficultyButton() {
      const button = $("sameDifficultyBtn");
      if (!button) return;
      const left = getRemainingQuestions(currentGrade, currentDifficulty).length;
      button.disabled = left <= 0;
      button.textContent = left > 0 ? `同難度再抽一題（剩 ${left} 張）` : "此難度已抽完";
    }


    function setDisplayText(element, text) {
      element.textContent = text;
    }

    let currentGrade = "low";
    let currentDifficulty = "easy";
    let currentQuestions = [];
    let currentQuestion = null;
    let timer = null;
    let secondsLeft = 40;
    let answerRevealed = false;

    const $ = (id) => document.getElementById(id);

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(screen => screen.classList.remove("active"));
      $(id).classList.add("active");
    }

    function goGrade() {
      showScreen("gradeScreen");
    }

    function selectGrade(grade) {
      currentGrade = grade;
      document.body.classList.toggle("low-grade-mode", grade === "low");
      updateDifficultyScreen();
      showScreen("difficultyScreen");
    }

    function updateDifficultyScreen() {
      const bank = questionBank[currentGrade];
      const easyLeft = getRemainingQuestions(currentGrade, "easy").length;
      const mediumLeft = getRemainingQuestions(currentGrade, "medium").length;
      const hardLeft = getRemainingQuestions(currentGrade, "hard").length;

      $("gradeLabel").textContent = `Step 2｜${bank.label}`;
      $("easyCount").textContent = `剩 ${easyLeft} / 共 ${bank.easy.length} 張題卡，適合暖身與快速搶答。`;
      $("mediumCount").textContent = `剩 ${mediumLeft} / 共 ${bank.medium.length} 張題卡，適合小組討論後回答。`;
      $("hardCount").textContent = `剩 ${hardLeft} / 共 ${bank.hard.length} 張題卡，適合挑戰與加分。`;

      document.querySelector(".difficulty-btn.easy").disabled = easyLeft <= 0;
      document.querySelector(".difficulty-btn.medium").disabled = mediumLeft <= 0;
      document.querySelector(".difficulty-btn.hard").disabled = hardLeft <= 0;
    }

    function startDraw(difficulty) {
      clearTimer();
      currentDifficulty = difficulty;
      currentQuestions = shuffle([...getRemainingQuestions(currentGrade, difficulty)]);
      currentQuestion = null;
      answerRevealed = false;
      secondsLeft = 40;

      $("drawTitle").textContent = `${questionBank[currentGrade].label}｜${difficultyText[difficulty]}題`;
      $("drawStatus").textContent = "洗牌中，請稍候";
      $("cardsSpread").innerHTML = "";
      $("cardsSpread").classList.remove("show");
      $("questionView").classList.remove("show");
      $("answerBox").classList.remove("show");
      $("afterActions").classList.remove("show");
      $("finishEarlyBtn").disabled = false;
      $("timerHint").textContent = "學生作答中，時間到會自動公布答案。";
      setTimerUI(40);

      showScreen("drawScreen");

      if (currentQuestions.length === 0) {
        showEmptyDeck();
        return;
      }

      $("shuffleZone").classList.add("show");

      window.setTimeout(() => {
        $("shuffleZone").classList.remove("show");
        renderCards();
        $("drawStatus").textContent = `請學生選一張題卡｜剩 ${currentQuestions.length} 張`;
      }, 1600);
    }

    function showEmptyDeck() {
      $("shuffleZone").classList.remove("show");
      $("cardsSpread").innerHTML = "";
      $("cardsSpread").classList.remove("show");
      $("questionNumber").textContent = `${questionBank[currentGrade].label}｜${difficultyText[currentDifficulty]}題`;
      setDisplayText($("questionText"), "這個難度的題卡已經全部抽完了");
      setDisplayText($("answerText"), "請回到難度選擇，換一個難度繼續抽卡。若要重新開始整輪題庫，重新整理網頁即可。");
      adjustTextFit();
      $("answerBox").classList.remove("show");
      $("finishEarlyBtn").disabled = true;
      $("afterActions").classList.add("show");
      updateSameDifficultyButton();
      $("questionView").classList.add("show");
      $("drawStatus").textContent = "這個難度已抽完";
      $("timerHint").textContent = "這一組年級與難度已經沒有剩餘題卡。";
      setTimerUI(0);
    }

    function renderCards() {
      const spread = $("cardsSpread");
      spread.innerHTML = "";
      const count = currentQuestions.length;

      currentQuestions.forEach((item, index) => {
        const card = document.createElement("button");
        card.className = "pick-card";
        card.type = "button";
        card.setAttribute("aria-label", `選擇第 ${index + 1} 張題卡`);
        card.style.setProperty("--deal-delay", `${index * 42}ms`);
        card.style.setProperty("--spread-rotate", `${((index % 7) - 3) * 2.4}deg`);
        card.dataset.index = index;
        card.innerHTML = `
          <div class="card-inner">
            <div class="card-face card-back"><span>？</span></div>
            <div class="card-face card-front">題卡</div>
          </div>
        `;
        card.addEventListener("click", () => pickCard(index, card));
        spread.appendChild(card);
      });

      requestAnimationFrame(() => spread.classList.add("show"));
    }

    function pickCard(index, selectedCard) {
      currentQuestion = currentQuestions[index];
      removeDrawnQuestion(currentGrade, currentDifficulty, currentQuestion);
      updateDifficultyScreen();
      const left = getRemainingQuestions(currentGrade, currentDifficulty).length;
      $("drawStatus").textContent = `抽卡完成｜剩 ${left} 張`;
      document.querySelectorAll(".pick-card").forEach((card, i) => {
        card.disabled = true;
        if (i === index) {
          card.classList.add("chosen");
        } else {
          const x = i % 2 === 0 ? -420 : 420;
          const y = -280 + (i % 5) * 30;
          card.style.setProperty("--collect-x", `${x}px`);
          card.style.setProperty("--collect-y", `${y}px`);
          card.classList.add("collect");
        }
      });

      window.setTimeout(() => {
        selectedCard.classList.add("flipped");
      }, 420);

      window.setTimeout(() => {
        $("cardsSpread").classList.remove("show");
        showQuestion();
      }, 1150);
    }

    function showQuestion() {
      $("questionNumber").textContent = `${questionBank[currentGrade].label}｜${difficultyText[currentDifficulty]}題`;
      document.body.classList.toggle("low-grade-mode", currentGrade === "low");
      setDisplayText($("questionText"), currentQuestion.q);
      setDisplayText($("answerText"), currentQuestion.a);
      adjustTextFit();
      $("answerBox").classList.remove("show");
      $("afterActions").classList.remove("show");
      $("finishEarlyBtn").disabled = false;
      updateSameDifficultyButton();
      $("questionView").classList.add("show");
      $("drawStatus").textContent = "40 秒倒數開始";
      startTimer();
    }

    function adjustTextFit() {
      const question = $("questionText");
      const answer = $("answerText");
      const qLength = question.textContent.length;
      const aLength = answer.textContent.length;

      question.style.fontSize = "";
      answer.style.fontSize = "";

      if (currentGrade === "low") {
        if (qLength >= 30) question.style.fontSize = "clamp(1.08rem, 2.15vw, 2.3rem)";
        else if (qLength >= 22) question.style.fontSize = "clamp(1.16rem, 2.3vw, 2.5rem)";

        if (aLength >= 30) answer.style.fontSize = "clamp(1rem, 2vw, 2rem)";
        else if (aLength >= 20) answer.style.fontSize = "clamp(1.08rem, 2.15vw, 2.2rem)";
      } else {
        if (qLength >= 30) question.style.fontSize = "clamp(1.45rem, 2.65vw, 2.9rem)";
        else if (qLength >= 22) question.style.fontSize = "clamp(1.6rem, 2.95vw, 3.25rem)";

        if (aLength >= 30) answer.style.fontSize = "clamp(1.25rem, 2.45vw, 2.35rem)";
        else if (aLength >= 20) answer.style.fontSize = "clamp(1.35rem, 2.8vw, 2.55rem)";
      }
    }

    function startTimer() {
      clearTimer();
      secondsLeft = 40;
      answerRevealed = false;
      setTimerUI(secondsLeft);

      timer = window.setInterval(() => {
        secondsLeft -= 1;
        setTimerUI(secondsLeft);

        if (secondsLeft <= 0) {
          revealAnswer(false);
        }
      }, 1000);
    }

    function setTimerUI(seconds) {
      const safeSeconds = Math.max(0, seconds);
      $("timerNumber").textContent = safeSeconds;
      const progress = (safeSeconds / 40) * 100;
      document.documentElement.style.setProperty("--timer-progress", `${progress}%`);

      if (safeSeconds <= 10) {
        $("timerRing").style.background = `conic-gradient(var(--danger) ${progress}%, rgba(255,244,222,0.11) 0)`;
      } else {
        $("timerRing").style.background = `conic-gradient(var(--accent-2) ${progress}%, rgba(255,244,222,0.11) 0)`;
      }
    }

    function revealAnswer(isEarly) {
      if (answerRevealed || !currentQuestion) return;
      answerRevealed = true;
      clearTimer();
      $("finishEarlyBtn").disabled = true;
      $("answerBox").classList.add("show");
      $("afterActions").classList.add("show");
      $("drawStatus").textContent = isEarly ? "已提前公布解答" : "時間到，公布解答";
      $("timerHint").textContent = "答題流程結束後，請回到難度選擇或同難度再抽。";
      setTimerUI(0);
    }

    function returnToDifficulty() {
      clearTimer();
      answerRevealed = false;
      $("shuffleZone").classList.remove("show");
      $("cardsSpread").classList.remove("show");
      $("questionView").classList.remove("show");
      updateDifficultyScreen();
      showScreen("difficultyScreen");
    }

    function clearTimer() {
      if (timer) {
        window.clearInterval(timer);
        timer = null;
      }
    }

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function toggleFullScreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen?.();
      } else {
        document.exitFullscreen?.();
      }
    }

    initializeRemainingQuestions();
    updateDifficultyScreen();
  </script>
